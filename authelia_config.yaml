server:
  address: "tcp://0.0.0.0:9091/authelia"

log:
  level: debug

totp:
  issuer: authelia.com

identity_validation:
  reset_password:
    jwt_secret: a_random_jwt_secret_string_for_testing_only

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: deny
  rules:
    - domain: "127.0.0.1"
      policy: one_factor
    - domain: "localhost"
      policy: one_factor

session:
  name: authelia_session               
  secret: unsecure_session_secret                             
  expiration: 3600                               
  inactivity: 300                                  
  cookies:                        
    - domain: "127.0.0.1"                                      
      authelia_url: "https://127.0.0.1/authelia"                       
      default_redirection_url: "https://127.0.0.1/"
  redis:
    host: redis                                        
    port: 6379                                   
regulation:
  max_retries: 3
  find_time: 120
  ban_time: 300

storage:
  encryption_key: you_must_generate_a_random_string_of_more_than_twenty_chars_and_configure_this
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
